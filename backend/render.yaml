services:
  - type: web
    name: whatsapp-food-ordering-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_PHONE_NUMBER_ID
        sync: false
      - key: META_VERIFY_TOKEN
        sync: false
      - key: OWNER_WHATSAPP
        sync: false
      - key: RESTAURANT_NAME
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
